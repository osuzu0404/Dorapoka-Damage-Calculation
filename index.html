<script>
// ローカル実行用: アプリ内の window.storage をブラウザの localStorage に接続（記録の自動保存が働きます）
if (!window.storage) {
  window.storage = {
    async get(key) { const v = localStorage.getItem("dorapoka:" + key); if (v === null) throw new Error("not found"); return { key, value: v }; },
    async set(key, value) { localStorage.setItem("dorapoka:" + key, value); return { key, value }; },
    async delete(key) { localStorage.removeItem("dorapoka:" + key); return { key, deleted: true }; },
    async list(prefix) { const keys = Object.keys(localStorage).filter(k => k.startsWith("dorapoka:" + (prefix || ""))).map(k => k.slice(9)); return { keys }; },
  };
}
</script>
